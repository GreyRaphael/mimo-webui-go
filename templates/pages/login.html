{{define "pages/login.html"}}
<!DOCTYPE html>
<html lang="zh-CN" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - MiMo WebUI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.14.8/dist/cdn.min.js"></script>
</head>
<body class="h-full bg-gray-900 text-gray-100 flex items-center justify-center">
    <div class="w-full max-w-md px-6">
        <div class="bg-gray-800 rounded-2xl shadow-2xl p-8 border border-gray-700">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-blue-400">🤖 MiMo WebUI</h1>
                <p class="text-gray-400 mt-2">登录您的账户</p>
            </div>

            {{if .Error}}
            <div class="mb-4 p-3 bg-red-900/50 border border-red-700 rounded-lg text-red-300 text-sm">{{.Error}}</div>
            {{end}}

            <form method="POST" action="/api/login" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1.5">用户名</label>
                    <input type="text" name="username" value="{{.Username}}"
                        class="w-full px-4 py-2.5 bg-gray-700 border border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition text-gray-100 placeholder-gray-500"
                        placeholder="请输入用户名" autocomplete="username" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1.5">密码</label>
                    <input type="password" name="password"
                        class="w-full px-4 py-2.5 bg-gray-700 border border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition text-gray-100 placeholder-gray-500"
                        placeholder="请输入密码" autocomplete="current-password" required>
                </div>
                <button type="submit"
                    class="w-full py-2.5 bg-blue-600 hover:bg-blue-700 rounded-lg font-medium transition">
                    登 录
                </button>
            </form>

            <div class="mt-6 text-center text-sm text-gray-400">
                还没有账户？
                <a href="/register" class="text-blue-400 hover:text-blue-300 transition">立即注册</a>
            </div>
        </div>
    </div>
</body>
</html>
{{end}}
