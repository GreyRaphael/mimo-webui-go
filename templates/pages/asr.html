{{define "pages/asr.html"}}
<!DOCTYPE html>
<html lang="zh-CN" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiMo WebUI</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://unpkg.com/htmx-ext-sse@2.2.2/sse.js"></script>
    <script defer src="https://unpkg.com/alpinejs@3.14.8/dist/cdn.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="/static/css/custom.css">
    <script src="/static/js/app.js"></script>
</head>
<body class="h-full bg-gray-900 text-gray-100">
    <div class="flex h-full">
<aside class="w-56 bg-gray-800 border-r border-gray-700 flex flex-col shrink-0">
    <div class="p-4 border-b border-gray-700">
        <h1 class="text-lg font-bold text-blue-400">🤖 MiMo WebUI</h1>
    </div>
    <nav class="flex-1 p-3 space-y-1 overflow-y-auto">
        <a href="/chat" class="nav-link flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-gray-700 transition">
            <span>💬</span> 对话
        </a>
        <a href="/image" class="nav-link flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-gray-700 transition">
            <span>🖼️</span> 图片理解
        </a>
        <a href="/audio" class="nav-link flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-gray-700 transition">
            <span>🎵</span> 音频理解
        </a>
        <a href="/video" class="nav-link flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-gray-700 transition">
            <span>🎬</span> 视频理解
        </a>
        <a href="/asr" class="nav-link flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-gray-700 transition">
            <span>🎤</span> 语音识别
        </a>
        <a href="/tts" class="nav-link flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-gray-700 transition">
            <span>🔊</span> 语音合成
        </a>
    </nav>
    <div class="p-3 border-t border-gray-700 text-sm text-gray-400">
        {{if .user}}
        <div class="flex items-center justify-between">
            <span>👤 {{.user.Username}}</span>
            <a href="/login" class="text-red-400 hover:text-red-300" onclick="document.cookie='token=;path=/;max-age=0'">退出</a>
        </div>
        {{end}}
    </div>
</aside>

        <main class="flex-1 flex flex-col overflow-hidden">
<div class="flex flex-col h-full overflow-y-auto p-6" x-data="asrApp()">
    <div class="max-w-4xl mx-auto w-full space-y-6">
        <h2 class="text-2xl font-bold text-blue-400 flex items-center gap-2">
            🎤 语音识别 (ASR)
        </h2>

        <!-- Upload Area -->
        <div class="bg-gray-800 rounded-xl p-4 border border-gray-700">
            <h3 class="text-sm font-medium text-gray-300 mb-3">上传音频 (支持 WAV/MP3)</h3>
            <div @dragover.prevent="dragging = true"
                @dragleave.prevent="dragging = false"
                @drop.prevent="handleDrop($event)"
                :class="dragging ? 'border-blue-500 bg-blue-500/10' : 'border-gray-600'"
                class="border-2 border-dashed rounded-lg p-6 text-center cursor-pointer transition"
                @click="$refs.fileInput.click()">
                <input type="file" x-ref="fileInput" accept=".wav,.mp3,audio/wav,audio/mpeg" class="hidden" @change="handleFile($event)">
                <p class="text-gray-400 text-sm">
                    <span x-show="!fileName">拖拽音频文件到此处，或点击选择</span>
                    <span x-show="fileName" class="text-blue-400 flex items-center justify-center gap-2">
                        <span x-text="fileName"></span>
                        <button @click.stop="clearFile()" class="text-gray-500 hover:text-red-400">✕</button>
                    </span>
                </p>
            </div>
            <div x-show="uploading" class="mt-2">
                <div class="w-full bg-gray-700 rounded-full h-2">
                    <div class="bg-blue-500 h-2 rounded-full transition-all" style="width: 100%"></div>
                </div>
                <p class="text-xs text-gray-400 mt-1">上传中...</p>
            </div>
        </div>

        <!-- Audio Preview -->
        <div x-show="previewUrl" class="bg-gray-800 rounded-xl p-4 border border-gray-700">
            <h3 class="text-sm font-medium text-gray-300 mb-3">预览</h3>
            <audio :src="previewUrl" controls class="w-full"></audio>
        </div>

        <!-- Options -->
        <div class="bg-gray-800 rounded-xl p-4 border border-gray-700">
            <h3 class="text-sm font-medium text-gray-300 mb-3">参数设置</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- Language -->
                <div>
                    <label class="text-xs text-gray-400 mb-1 block">识别语言</label>
                    <select x-model="language"
                        class="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition text-gray-100 text-sm">
                        <option value="auto">自动检测</option>
                        <option value="zh">中文</option>
                        <option value="en">英文</option>
                    </select>
                </div>
                <!-- Stream Toggle -->
                <div class="flex items-center gap-3">
                    <label class="text-xs text-gray-400">流式输出</label>
                    <button @click="stream = !stream"
                        :class="stream ? 'bg-blue-600' : 'bg-gray-600'"
                        class="relative inline-flex h-6 w-11 items-center rounded-full transition-colors focus:outline-none">
                        <span :class="stream ? 'translate-x-6' : 'translate-x-1'"
                            class="inline-block h-4 w-4 transform rounded-full bg-white transition-transform"></span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Submit -->
        <div class="flex gap-2">
            <button @click="submit()" :disabled="loading || !fileId"
                class="px-6 py-2.5 bg-blue-600 hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed rounded-lg font-medium transition">
                <span x-show="!loading">开始识别</span>
                <span x-show="loading">识别中...</span>
            </button>
            <button @click="clearAll()" x-show="result || reasoning || error || fileId || previewUrl"
                class="px-4 py-2.5 bg-gray-600 hover:bg-gray-500 rounded-lg text-sm transition text-gray-300">
                清空
            </button>
        </div>

        <!-- Reasoning -->
        <div x-show="reasoning" class="bg-gray-800/50 rounded-xl p-4 border border-gray-700/50">
            <details open>
                <summary class="text-sm font-medium text-gray-400 cursor-pointer hover:text-gray-300 select-none">💭 推理过程</summary>
                <div class="mt-2 text-sm text-gray-400 prose prose-invert prose-sm max-w-none opacity-80" x-html="renderMarkdown(reasoning)"></div>
            </details>
        </div>

        <!-- Result -->
        <div x-show="result" class="bg-gray-800 rounded-xl p-6 border border-gray-700">
            <h3 class="text-sm font-medium text-gray-300 mb-3">识别结果</h3>
            <div class="prose prose-invert prose-sm max-w-none whitespace-pre-wrap" x-text="result"></div>
        </div>

                <!-- Error -->
        <div x-show="error" class="p-3 bg-red-900/50 border border-red-700 rounded-lg text-red-300 text-sm" x-text="error"></div>
    </div>
</div>

<script>
// OpenAI-compatible SSE parser — parses JSON from data: lines
function parseSSEStream(reader, callbacks) {
    const decoder = new TextDecoder();
    let buffer = '';
    return new Promise((resolve, reject) => {
        function processChunk({ done, value }) {
            if (done) { if (callbacks.onDone) callbacks.onDone(); resolve(); return; }
            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop() || '';
            for (const line of lines) {
                if (!line.startsWith('data:')) continue;
                const data = line.startsWith('data: ') ? line.slice(6) : line.slice(5);
                if (data === '[DONE]') { if (callbacks.onDone) callbacks.onDone(); resolve(); return; }
                try {
                    const chunk = JSON.parse(data);
                    const delta = chunk.choices?.[0]?.delta;
                    if (!delta) continue;
                    if (delta.reasoning_content && callbacks.onReasoning) callbacks.onReasoning(delta.reasoning_content);
                    if (delta.content && callbacks.onMessage) callbacks.onMessage(delta.content);
                } catch (e) { /* skip unparseable */ }
            }
            reader.read().then(processChunk).catch(reject);
        }
        reader.read().then(processChunk).catch(reject);
    });
}

function asrApp() {
    return {
        fileId: '',
        fileName: '',
        previewUrl: '',
        language: 'auto',
        stream: true,
        result: '',
        reasoning: '',
        error: '',
        loading: false,
        uploading: false,
        dragging: false,

        // Restore state from sessionStorage (survives page navigation)

        async init() {
            const saved = sessionStorage.getItem('asr_analysis');
            if (saved) {
                try {
                    const d = JSON.parse(saved);
                    if (d.result) this.result = d.result;
                    if (d.reasoning) this.reasoning = d.reasoning;
                    if (d.fileName) this.fileName = d.fileName;
                    if (d.language) this.language = d.language;
                    if (d.stream !== undefined) this.stream = d.stream;
                    const file = await loadFileFromDB('asr_file');
                    if (file) {
                        this.previewUrl = URL.createObjectURL(file);
                        this.fileId = d.fileId || '';
                    }
                } catch(e) {}
            }
        },
        _saveState() {
            sessionStorage.setItem('asr_analysis', JSON.stringify({result: this.result, reasoning: this.reasoning, fileName: this.fileName, fileId: this.fileId, language: this.language, stream: this.stream}));
        },

        handleFile(e) {
            const file = e.target.files[0];
            if (!file) return;
            this.uploadFile(file);
        },

        handleDrop(e) {
            this.dragging = false;
            const file = e.dataTransfer.files[0];
            if (file) this.uploadFile(file);
        },

        async uploadFile(file) {
            this.fileName = file.name;
            this.uploading = true;
            this.error = '';
            this.result = '';
            this.reasoning = '';
            try {
                const form = new FormData();
                form.append('file', file);
                const resp = await fetch('/api/upload', { method: 'POST', body: form });
                if (!resp.ok) {
                    const err = await resp.json();
                    throw new Error(err.error || 'Upload failed');
                }
                const data = await resp.json();
                this.fileId = data.file_id;
                this.previewUrl = URL.createObjectURL(file);
                saveFileToDB('asr_file', file);
            } catch (e) {
                this.error = '上传失败: ' + e.message;
            } finally {
                this.uploading = false;
            }
        },

        async submit() {
            if (!this.fileId) return;
            this.loading = true;
            this.result = '';
            this.reasoning = '';
            this.error = '';
            sessionStorage.removeItem('asr_analysis');

            try {
                const body = {
                    file_id: this.fileId,
                    language: this.language,
                    stream: this.stream
                };

                const resp = await fetch('/api/asr', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });

                if (!resp.ok) {
                    const err = await resp.json();
                    throw new Error(err.error || 'Recognition failed');
                }

                if (this.stream) {
                    const reader = resp.body.getReader();
                    await parseSSEStream(reader, {
                        onReasoning: (data) => { this.reasoning += data; },
                        onMessage: (data) => {
                        this.result += data;
                    }
                    });
                } else {
                    const data = await resp.json();
                    if (data.choices && data.choices.length > 0 && data.choices[0].message) {
                        this.result = data.choices[0].message.content || JSON.stringify(data);
                    } else {
                        this.result = JSON.stringify(data);
                    }
                }
            } catch (e) {
                this.error = e.message;
            } finally {
                this.loading = false;
                if (this.result) this._saveState();
            }
        },

        clearFile() {
            this.fileId = '';
            this.fileName = '';
            this.previewUrl = '';
            removeFileFromDB('asr_file');
        },

        renderMarkdown(text) {
            if (!text) return '';
            if (typeof marked !== 'undefined') {
                try {
                    marked.setOptions({ breaks: true, gfm: true, silent: true });
                    return marked.parse(text);
                } catch(e) { return text.replace(/\n/g, '<br>'); }
            }
            return text.replace(/\n/g, '<br>');
        },

        clearAll() {
            this.result = ''; this.reasoning = ''; this.error = ''; this.fileId = ''; this.fileName = ''; this.previewUrl = '';
            sessionStorage.removeItem('asr_analysis');
            removeFileFromDB('asr_file');
            if (this.$refs.fileInput) this.$refs.fileInput.value = '';
        }
    };
}
</script>
        </main>
    </div>
</body>
</html>
{{end}}
