name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build Linux binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o mimo-webui .

      - name: Package release
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          PKG_NAME="mimo-webui-${VERSION}-linux-amd64"
          mkdir -p "${PKG_NAME}"
          cp mimo-webui "${PKG_NAME}/"
          cp config.toml.example "${PKG_NAME}/"
          cp deploy/install.sh "${PKG_NAME}/"
          cp deploy/uninstall.sh "${PKG_NAME}/"
          chmod +x "${PKG_NAME}/mimo-webui" "${PKG_NAME}/install.sh" "${PKG_NAME}/uninstall.sh"
          tar czf "${PKG_NAME}.tar.gz" "${PKG_NAME}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: mimo-webui-*-linux-amd64.tar.gz
          generate_release_notes: true
